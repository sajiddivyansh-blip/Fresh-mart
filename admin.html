<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
    </header>
    <nav>
        <ul>
            <li><a href="manage-products.html">Manage Products</a></li>
            <li><a href="manage-inventory.html">Manage Inventory</a></li>
            <li><a href="manage-orders.html">Manage Orders</a></li>
        </ul>
    </nav>
    <main>
        <section id="products">
            <h2>Products</h2>
            <button>Add Product</button>
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Product rows go here -->
                </tbody>
            </table>
        </section>
        <section id="inventory">
            <h2>Inventory</h2>
            <button>Update Inventory</button>
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Inventory rows go here -->
                </tbody>
            </table>
        </section>
        <section id="orders">
            <h2>Orders</h2>
            <button>View Orders</button>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Order rows go here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Gift Shop Management System</p>
    </footer>
</body>
</html>
